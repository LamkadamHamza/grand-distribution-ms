server:
  port: 8888

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:  # ✅ Correction: "mvc" pas "server.webmvc"
        routes:
          - id: product-service
            uri: lb://PRODUCT-SERVICE
            predicates:
              - Path=/api/products/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.lamkadam.apigateway: DEBUG